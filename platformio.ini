[platformio]
default_envs = heltec_v4_bootstrap
description = lora20 bootstrap firmware for Heltec V4 over USB serial

[env:heltec_v4_bootstrap]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_upload.flash_size = 16MB
build_flags =
  -std=gnu++17
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D BOARD_HAS_PSRAM
  -D LORA20_FW_VERSION=\"0.1.0-bootstrap\"
lib_deps =
  bblanchon/ArduinoJson @ ^6.21.5
  https://github.com/orlp/ed25519.git
