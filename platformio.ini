[platformio]
default_envs = heltec_v4_bootstrap
description = lora20 bootstrap firmware for Heltec V4 over USB serial

[env:heltec_v4_bootstrap]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
lib_ldf_mode = chain+
build_flags =
  -std=gnu++17
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D BOARD_HAS_PSRAM
  -D REGION_EU868
  -D REGION_EU433
  -D REGION_US915
  -D REGION_US915_HYBRID
  -D REGION_AU915
  -D REGION_AS923
  -D REGION_KR920
  -D REGION_IN865
  -D REGION_CN470
  -D REGION_CN779
  -D REGION_RU864
  -D MCU_ESP32_S3
  -D HELTEC_BOARD=30
  -D SLOW_CLK_TPYE=0
  -D WIFI_LORA_32_V4
  -D RADIO_CHIP_SX1262
  -D LoRaWAN_DEBUG_LEVEL=0
  -D ACTIVE_REGION=LORAMAC_REGION_EU868
  -D LORAWAN_PREAMBLE_LENGTH=8
  -D LORAWAN_DEVEUI_AUTO=0
  -D LORA_RX_LNA=1
  -D GPIO_PIN_COUNT=SOC_GPIO_PIN_COUNT
  -D USE_KCT8103L_PA
  -D Vext=36
  -D LED=35
  -D PIN_ADC_CTRL=37
  -D PIN_VBAT_READ=1
  -D RST_OLED=21
  -D SCL_OLED=18
  -D SDA_OLED=17
  -D LORA20_OLED_I2C_ADDR=0x3C
  -D LORA20_OLED_I2C_FREQ=100000
  -D LORA20_OLED_GEOMETRY=GEOMETRY_128_64
  -D LORA20_OLED_VEXT_ON_LEVEL=LOW
  -D LORA20_OLED_VEXT_OFF_LEVEL=HIGH
  -D LORA20_OLED_DRIVER_SSD1306=1
  -D LORA20_DISABLE_VENDOR_OLED=1
  -D RST_LoRa=12
  -D BUSY_LoRa=13
  -D DIO0=14
  -D LORA20_FW_VERSION=\"0.1.2-bootstrap-chat\"
  -L"$PROJECT_LIBDEPS_DIR/$PIOENV/Heltec ESP32 Dev-Boards/src/esp32s3"
  -llorawan
lib_deps =
  bblanchon/ArduinoJson @ ^6.21.5
  https://github.com/orlp/ed25519.git
  C:/Users/Kosmo/Documents/Playground/_vendor/Heltec_ESP32
  adafruit/Adafruit GFX Library @ ^1.11.11
  adafruit/Adafruit BusIO @ ^1.16.1
  adafruit/Adafruit SSD1306 @ ^2.5.13

